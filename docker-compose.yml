version: "3.9"

services:
  api:
    build: .
    container_name: fastapi_jogos
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn Teste:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: celery_worker
    command: celery -A Teste.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis

zookeeper:
image: confluentinc/cp-zookeeper:latest   
ports:
  - "2181:2181"
environment: 
    ZOOKEEPER_CLIENT_PORT: 2181
    ZOOKEEPER_TICK_TIME: 2000


kafka:
  imagem: confluentinc/cp-kafka:latest 
  container_name: kafka-jogos
  ports:
  - "9092:9092"
  depends_on:
  - zookeeper
  environment:
    -KAFKA_BROKER_ID=1
    -KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
    -KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka 
    -KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 

kafka-ui:
      image: provectuslabs/kaka-ui:latest
      container_name: kafka_jogo-ui
      ports:
        - "8000:8000"
      depends_on: 
        - kafka
      environment:
        -KAFKA_CLUSTERS_0_BOOTSTRAP_SERVES=kafka:9092
        -KAFKA_CLUSTER_0_NAME=jogos